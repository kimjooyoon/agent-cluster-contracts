name: security

# Merge-blocking gate for credential leaks.
#
# Runs tools/secretscan against the entire working tree. Any match (AWS key,
# GitHub token, Slack token, JWT, PEM, Google API, Anthropic key, OpenAI key)
# fails the job. To intentionally include a string that would otherwise match
# (in tests or documentation), append "secretscan:ignore" on the same line.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Build secretscan
        run: go build -o bin/ ./tools/secretscan

      - name: Scan working tree
        run: ./bin/secretscan .
